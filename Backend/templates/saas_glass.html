<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Gradient Glassmorphism Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: A4;
        margin: 0;
      }
      * {
        box-sizing: border-box;
      }
      html {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        width: 210mm;
        min-height: 297mm;
        background: linear-gradient(
          135deg,
          #e0e7ff 0%,
          #f5f3ff 40%,
          #fae8ff 100%
        );
        color: #3b0764; /* deep purple text */
        font-size: 13px;
        line-height: 1.5;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .wrapper {
        padding: 35px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-height: 297mm;
      }
      /* Translucent Glass header */
      .glass-header {
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        padding: 25px 30px;
        box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header-details h1 {
        font-family: "Outfit", sans-serif;
        font-size: 32px;
        font-weight: 800;
        margin: 0 0 5px 0;
        background: linear-gradient(135deg, #4f46e5, #d946ef);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }
      .header-details p {
        font-family: "Outfit", sans-serif;
        font-size: 13.5px;
        font-weight: 500;
        color: #6b21a8;
        margin: 0;
        letter-spacing: 0.5px;
      }
      .contact-bubble {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 12px;
        font-size: 11.5px;
        color: #6b21a8;
      }
      .contact-bubble a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 500;
      }
      .contact-bubble a:hover {
        text-decoration: underline;
      }
      /* Main body layouts */
      .grid-layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 16px;
        padding: 20px 24px;
        box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.04);
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .panel-title {
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0;
        color: #6b21a8;
        border-bottom: 2px solid rgba(139, 92, 246, 0.15);
        padding-bottom: 6px;
      }
      /* Dynamic item styles */
      .education-item,
      .experience-item,
      .project-item,
      .certification-item {
        margin-bottom: 0;
      }
      .items-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .edu-header,
      .exp-header,
      .project-header,
      .cert-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 13.5px;
        margin-bottom: 2px;
      }
      .edu-degree,
      .exp-role,
      .project-title,
      .cert-title {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        color: #4c0519; /* dark rose/purple */
      }
      .edu-date,
      .exp-date,
      .cert-date {
        font-size: 11.5px;
        color: #701a75;
        font-weight: 500;
        font-family: "Outfit", sans-serif;
      }
      .edu-institute,
      .exp-company,
      .cert-issuer {
        font-weight: 600;
        color: #4f46e5;
        font-size: 12.5px;
        margin-bottom: 4px;
      }
      .edu-grade {
        font-size: 11.5px;
        color: #4f46e5;
      }
      .exp-desc,
      .project-desc {
        color: #581c87;
        margin: 4px 0 0 0;
        font-size: 12.5px;
      }
      .project-links,
      .cert-link {
        font-size: 11.5px;
      }
      .project-links a,
      .cert-link a {
        color: #d946ef;
        text-decoration: none;
        font-weight: 500;
      }
      .project-links a:hover,
      .cert-link a:hover {
        text-decoration: underline;
      }
      .project-tech {
        font-size: 11px;
        color: #6b21a8;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(139, 92, 246, 0.2);
        padding: 3px 6px;
        border-radius: 4px;
        display: inline-block;
        margin-top: 6px;
      }
      /* Skills */
      .skills-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag {
        background: rgba(255, 255, 255, 0.85);
        color: #4f46e5;
        border: 1px solid rgba(79, 70, 229, 0.15);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 600;
        font-family: "Outfit", sans-serif;
      }
      .languages-text {
        font-size: 12px;
        color: #581c87;
        font-weight: 500;
      }
      .page-break {
        page-break-before: always;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- GLASS HEADER -->
      <div class="glass-header">
        <div class="header-details">
          <h1>{{name}}</h1>
          <div style="font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; color: #4f46e5; text-transform: uppercase; margin-bottom: 5px;">{{title}}</div>
          <p>{{summary}}</p>
        </div>
        <div class="contact-bubble">
          <div>📍 {{location}}</div>
          <div>📞 {{phone}}</div>
          <div>✉️ <a href="mailto:{{email}}">{{email}}</a></div>
          <div>🔗 <a href="{{portfolio}}" target="_blank">Portfolio</a></div>
          <div>🐙 <a href="{{github}}" target="_blank">GitHub</a></div>
          <div>💼 <a href="{{linkedin}}" target="_blank">LinkedIn</a></div>
        </div>
      </div>

      <!-- MAIN BODY GRID -->
      <div class="grid-layout">
        <!-- Left side panels -->
        <div style="display: flex; flex-direction: column; gap: 20px">
          <div class="glass-panel">
            <h3 class="panel-title">Experience</h3>
            <div class="items-container">
              <style>
                .experience-item {
                  border-bottom: 1px solid rgba(139, 92, 246, 0.1);
                  padding-bottom: 12px;
                }
                .experience-item:last-child {
                  border-bottom: none;
                  padding-bottom: 0;
                }
              </style>
              {{experience}}
            </div>
          </div>

          <div class="glass-panel">
            <h3 class="panel-title">Featured Projects</h3>
            <div class="items-container">
              <style>
                .project-item {
                  border-bottom: 1px solid rgba(139, 92, 246, 0.1);
                  padding-bottom: 12px;
                }
                .project-item:last-child {
                  border-bottom: none;
                  padding-bottom: 0;
                }
              </style>
              {{projects}}
            </div>
          </div>
        </div>

        <!-- Right side panels -->
        <div style="display: flex; flex-direction: column; gap: 20px">
          <div class="glass-panel">
            <h3 class="panel-title">Skill Arsenal</h3>
            <div class="skills-container">{{skills}}</div>
          </div>

          <div class="glass-panel">
            <h3 class="panel-title">Education</h3>
            <div class="items-container">
              <style>
                .education-item {
                  border-bottom: 1px solid rgba(139, 92, 246, 0.1);
                  padding-bottom: 10px;
                }
                .education-item:last-child {
                  border-bottom: none;
                  padding-bottom: 0;
                }
              </style>
              {{education}}
            </div>
          </div>

          <div class="glass-panel">
            <h3 class="panel-title">Credentials</h3>
            <div class="items-container">
              <style>
                .certification-item {
                  border-bottom: 1px solid rgba(139, 92, 246, 0.1);
                  padding-bottom: 10px;
                }
                .certification-item:last-child {
                  border-bottom: none;
                  padding-bottom: 0;
                }
              </style>
              {{certifications}}
            </div>
          </div>

          <div class="glass-panel">
            <h3 class="panel-title">Languages</h3>
            <div class="languages-text">{{languages}}</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
