<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal One-Page Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: A4;
        margin: 12mm;
      }
      * {
        box-sizing: border-box;
      }
      html {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body {
        font-family: "Roboto", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        color: #1e293b;
        font-size: 11.5px;
        line-height: 1.4;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 2px solid #0f172a;
        padding-bottom: 6px;
        margin-bottom: 10px;
      }
      .header h1 {
        font-size: 22px;
        font-weight: 700;
        color: #0f172a;
        margin: 0;
        letter-spacing: -0.5px;
        text-transform: uppercase;
      }
      .contact-info {
        text-align: right;
        font-size: 10px;
        color: #475569;
      }
      .contact-info a {
        color: #1e293b;
        text-decoration: none;
        font-weight: 500;
      }
      .contact-info a:hover {
        text-decoration: underline;
      }
      .summary {
        font-size: 11px;
        color: #475569;
        margin-bottom: 12px;
        text-align: justify;
      }
      .section-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #0f172a;
        border-bottom: 1px solid #cbd5e1;
        margin: 12px 0 8px 0;
        padding-bottom: 2px;
      }
      /* Lists items compact spacing */
      .education-item,
      .experience-item,
      .project-item,
      .certification-item {
        margin-bottom: 8px;
      }
      .education-item:last-child,
      .experience-item:last-child,
      .project-item:last-child,
      .certification-item:last-child {
        margin-bottom: 0;
      }
      .edu-header,
      .exp-header,
      .project-header,
      .cert-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 11.5px;
        margin-bottom: 1px;
      }
      .edu-degree,
      .exp-role,
      .project-title,
      .cert-title {
        font-weight: 700;
        color: #0f172a;
      }
      .edu-date,
      .exp-date,
      .cert-date {
        font-size: 10px;
        color: #64748b;
        font-weight: 500;
      }
      .edu-institute,
      .exp-company,
      .cert-issuer {
        font-weight: 500;
        color: #475569;
        font-size: 11px;
        margin-bottom: 2px;
      }
      .edu-grade {
        font-size: 10px;
        color: #64748b;
        font-style: italic;
      }
      .exp-desc,
      .project-desc {
        margin: 2px 0 0 0;
        color: #475569;
        font-size: 11px;
        text-align: justify;
      }
      .project-links,
      .cert-link {
        font-size: 10px;
      }
      .project-links a,
      .cert-link a {
        color: #0f172a;
        text-decoration: underline;
      }
      .project-tech {
        font-size: 10px;
        color: #64748b;
        margin-top: 2px;
      }
      /* Skills */
      .skills-container {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .tag {
        background-color: #f1f5f9;
        color: #334155;
        padding: 3px 6px;
        border-radius: 3px;
        font-size: 10.5px;
        font-weight: 500;
        border: 1px solid #e2e8f0;
      }
      .languages-text {
        font-size: 11px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <h1>{{name}}</h1>
      <div class="contact-info">
        📍 {{location}} &bull; 📞 {{phone}} &bull; ✉️
        <a href="mailto:{{email}}">{{email}}</a><br />
        🔗 <a href="{{portfolio}}" target="_blank">Portfolio</a> |
        <a href="{{github}}" target="_blank">GitHub</a> |
        <a href="{{linkedin}}" target="_blank">LinkedIn</a>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="summary">{{summary}}</div>

    <!-- EXPERIENCE -->
    <div class="section-title">Work Experience</div>
    <div>{{experience}}</div>

    <!-- EDUCATION -->
    <div class="section-title">Education</div>
    <div>{{education}}</div>

    <!-- PROJECTS -->
    <div class="section-title">Projects</div>
    <div>{{projects}}</div>

    <!-- SKILLS -->
    <div class="section-title">Skills</div>
    <div class="skills-container">{{skills}}</div>

    <!-- CERTIFICATIONS -->
    <div class="section-title">Certifications</div>
    <div>{{certifications}}</div>

    <!-- LANGUAGES -->
    <div class="section-title">Languages</div>
    <div class="languages-text">{{languages}}</div>
  </body>
</html>
