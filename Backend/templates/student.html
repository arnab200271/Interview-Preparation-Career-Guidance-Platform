<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student / Fresher Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: A4;
        margin: 0;
      }
      * {
        box-sizing: border-box;
      }
      html {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body {
        font-family: "Open Sans", sans-serif;
        margin: 0;
        padding: 0;
        width: 210mm;
        min-height: 297mm;
        background-color: #f8fafc;
        color: #334155;
        font-size: 13px;
        line-height: 1.5;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .wrapper {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 25px;
        min-height: 297mm;
      }
      /* Rounded header card */
      .header-card {
        background: linear-gradient(135deg, #0d9488, #4f46e5);
        border-radius: 12px;
        padding: 30px;
        color: #ffffff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .header-info h1 {
        font-family: "Poppins", sans-serif;
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 5px 0;
        color: #ffffff;
      }
      .header-info p {
        font-size: 14px;
        margin: 0;
        opacity: 0.9;
      }
      .contact-grid {
        display: flex;
        flex-direction: column;
        gap: 5px;
        font-size: 12px;
        opacity: 0.95;
      }
      .contact-grid a {
        color: #ffffff;
        text-decoration: none;
      }
      .contact-grid a:hover {
        text-decoration: underline;
      }
      /* Section style */
      .section {
        background-color: #ffffff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      }
      .section-title {
        font-family: "Poppins", sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: #4f46e5;
        margin: 0 0 16px 0;
        border-bottom: 2px solid #f1f5f9;
        padding-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      /* Dynamic grid layout for academic/skills top */
      .grid-top {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
      }
      /* Education & Items styling */
      .education-item,
      .experience-item,
      .project-item,
      .certification-item {
        margin-bottom: 16px;
        border-left: 2px solid #e2e8f0;
        padding-left: 12px;
      }
      .education-item:last-child,
      .experience-item:last-child,
      .project-item:last-child,
      .certification-item:last-child {
        margin-bottom: 0;
      }
      .edu-header,
      .exp-header,
      .project-header,
      .cert-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 13.5px;
        margin-bottom: 2px;
      }
      .edu-degree,
      .exp-role,
      .project-title,
      .cert-title {
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        color: #1e293b;
      }
      .edu-date,
      .exp-date,
      .cert-date {
        font-size: 11.5px;
        color: #64748b;
        font-weight: 500;
      }
      .edu-institute,
      .exp-company,
      .cert-issuer {
        font-weight: 500;
        color: #0d9488;
        font-size: 12.5px;
        margin-bottom: 4px;
      }
      .edu-grade {
        font-size: 11.5px;
        color: #4f46e5;
        font-weight: 500;
      }
      .exp-desc,
      .project-desc {
        margin: 4px 0 0 0;
        color: #475569;
        font-size: 12.5px;
      }
      .project-links,
      .cert-link {
        font-size: 11px;
      }
      .project-links a,
      .cert-link a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 500;
      }
      .project-links a:hover,
      .cert-link a:hover {
        text-decoration: underline;
      }
      .project-tech {
        font-size: 11px;
        color: #64748b;
        margin-top: 4px;
      }
      /* Skill tags */
      .skills-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag {
        background-color: #f1f5f9;
        color: #334155;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 11.5px;
        font-weight: 500;
        border: 1px solid #e2e8f0;
      }
      .languages-text {
        font-size: 12.5px;
        color: #475569;
      }
      .page-break {
        page-break-before: always;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- HEADER -->
      <div class="header-card">
        <div class="header-info">
          <h1>{{name}}</h1>
          <p>{{summary}}</p>
        </div>
        <div class="contact-grid">
          <span>📍 {{location}}</span>
          <span>📞 {{phone}}</span>
          <span>✉️ <a href="mailto:{{email}}">{{email}}</a></span>
          <span
            >🔗 <a href="{{portfolio}}" target="_blank">Portfolio</a> |
            <a href="{{github}}" target="_blank">GitHub</a> |
            <a href="{{linkedin}}" target="_blank">LinkedIn</a></span
          >
        </div>
      </div>

      <!-- DOUBLE COLUMN TOP GRID (Education & Skills) -->
      <div class="grid-top">
        <!-- Education -->
        <div class="section">
          <div class="section-title">Education</div>
          <div>{{education}}</div>
        </div>

        <!-- Skills -->
        <div class="section">
          <div class="section-title">Skills & Abilities</div>
          <div class="skills-container">{{skills}}</div>
          <div class="section-title" style="margin-top: 20px">Languages</div>
          <div class="languages-text">{{languages}}</div>
        </div>
      </div>

      <!-- Projects -->
      <div class="section">
        <div class="section-title">Key Projects & Hackathons</div>
        <div>{{projects}}</div>
      </div>

      <!-- Experience / Internships -->
      <div class="section">
        <div class="section-title">Experience & Extracurriculars</div>
        <div>{{experience}}</div>
      </div>

      <!-- Certifications -->
      <div class="section">
        <div class="section-title">Certifications</div>
        <div>{{certifications}}</div>
      </div>
    </div>
  </body>
</html>
